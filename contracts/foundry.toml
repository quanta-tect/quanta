    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/"
]
# Profile for invariant/fuzz testing
[profile.fuzz]
test = "test-invariant"
fuzz = { runs = 10000 }
invariant = { runs = 256, depth = 100 }

# Profile for formal verification
[profile.formal]
test = "test-formal"

