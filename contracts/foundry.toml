[profile.default]
src = "src-v1.1"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
test = "test-v1.1"

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/"
]

# Profile for invariant/fuzz testing
[profile.fuzz]
test = "test-invariant"
fuzz = { runs = 10000 }
invariant = { runs = 256, depth = 100 }

# Profile for formal verification
[profile.formal]
test = "test-formal"

[rpc_endpoints]
# base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
base = "${BASE_RPC_URL}"
arbitrum = "${ARBITRUM_RPC_URL}"


