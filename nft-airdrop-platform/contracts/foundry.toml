[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
fuzz = { runs = 256 }

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC}"
ethereum = "${ETH_RPC}"
polygon = "${POLYGON_RPC}"
bsc = "${BSC_RPC}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}" }
