name: "🧪 Forge Tests"

on:
  push:
    branches: [main]
    paths: ['contracts/**']
  pull_request:
    paths: ['contracts/**']

jobs:
  forge-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: contracts } }
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with: { version: stable }

      - name: Install dependencies
        run: |
          forge install foundry-rs/forge-std --no-commit
          forge install OpenZeppelin/openzeppelin-contracts --no-commit

      - name: Build
        run: forge build --sizes

      - name: Run v1.2 security tests
        run: forge test --match-path "test-v1.2/**" -vvv

      - name: Run v1.1 regression tests
        run: forge test --match-path "test-v1.1/**" -vvv

      - name: Run unit tests
        run: forge test --match-path "test/**" -vvv
